<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

                'gtm.start':
                    new Date().getTime(), event: 'gtm.js'
            }); var f = d.getElementsByTagName(s)[0],
                j = d.createElement(s), dl = l != 'dataLayer' ? '&l=' + l : ''; j.async = true; j.src =
                    'https://www.googletagmanager.com/gtm.js?id=' + i + dl; f.parentNode.insertBefore(j, f);
        })(window, document, 'script', 'dataLayer', 'GTM-PLL5SLNM');</script>
    <!-- End Google Tag Manager -->
    <title>تأكيد البريد الإلكتروني - MC PRIME NFC</title>
    <link rel="stylesheet" href="/nfc/homepage.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Cairo:wght@600;700&display=swap"
        rel="stylesheet">
    <script src="/nfc/api-config.js"></script>
    <script src="/nfc/auth.js"></script>
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 50px;
        }

        .auth-card {
            background: linear-gradient(145deg, var(--surface-color), #2a3d54);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(77, 166, 255, 0.1);
            text-align: center;
        }

        .status-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .status-icon.success {
            color: #4caf50;
        }

        .status-icon.error {
            color: #ff5252;
        }

        .status-icon.loading {
            color: #4DA6FF;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .auth-header h1 {
            color: #fff;
            margin-bottom: 10px;
            font-family: 'Cairo', sans-serif;
        }

        .auth-header p {
            color: var(--text-secondary-color);
        }

        .auth-footer {
            margin-top: 30px;
        }

        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
        }
    </style>
</head>

<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PLL5SLNM" height="0" width="0"
            style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <!-- Navbar (Simplified) -->
    <nav class="navbar" style="background: rgba(28, 42, 59, 1);">
        <div class="container nav-content">
            <a href="/nfc/" class="nav-logo">
                <img src="https://www.mcprim.com/nfc/mc-prime-nfc.png" alt="MC PRIME">
            </a>
            <a href="/nfc/login.html" class="btn btn-secondary nav-cta">تسجيل الدخول</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div id="loading-state">
                <i class="fas fa-spinner status-icon loading"></i>
                <div class="auth-header">
                    <h1>جاري التحقق...</h1>
                    <p>يرجى الانتظار بينما نتحقق من بريدك الإلكتروني</p>
                </div>
            </div>

            <div id="success-state" style="display: none;">
                <i class="fas fa-check-circle status-icon success"></i>
                <div class="auth-header">
                    <h1>تم التحقق بنجاح! 🎉</h1>
                    <p>تم تأكيد بريدك الإلكتروني. يمكنك الآن استخدام جميع ميزات MC PRIME.</p>
                </div>
                <div class="auth-footer">
                    <a href="/nfc/login.html" class="btn btn-primary">تسجيل الدخول الآن</a>
                </div>
            </div>

            <div id="error-state" style="display: none;">
                <i class="fas fa-times-circle status-icon error"></i>
                <div class="auth-header">
                    <h1>فشل التحقق</h1>
                    <p id="error-message">رابط التحقق غير صالح أو منتهي الصلاحية.</p>
                </div>
                <div class="auth-footer">
                    <a href="/nfc/login.html">العودة لتسجيل الدخول</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function verifyEmail() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            const loadingState = document.getElementById('loading-state');
            const successState = document.getElementById('success-state');
            const errorState = document.getElementById('error-state');
            const errorMessage = document.getElementById('error-message');

            if (!token) {
                loadingState.style.display = 'none';
                errorState.style.display = 'block';
                errorMessage.textContent = 'رابط التحقق غير صالح.';
                return;
            }

            try {
                const baseUrl = Auth.getBaseUrl();
                const response = await fetch(`${baseUrl}/api/auth/verify-email/${token}`, {
                    method: 'GET'
                });

                const data = await response.json();
                loadingState.style.display = 'none';

                if (data.success) {
                    successState.style.display = 'block';
                } else {
                    errorState.style.display = 'block';
                    errorMessage.textContent = data.error || 'رابط التحقق غير صالح أو منتهي الصلاحية.';
                }
            } catch (err) {
                console.error('[VerifyEmail] Error:', err);
                loadingState.style.display = 'none';
                errorState.style.display = 'block';
                errorMessage.textContent = 'خطأ في الاتصال بالخادم. حاول مرة أخرى.';
            }
        }

        // Start verification on page load
        verifyEmail();
    </script>
</body>

</html>
