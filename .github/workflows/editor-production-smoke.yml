name: Editor Production Smoke

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      production_url:
        description: Production base URL
        required: false
        default: https://www.mcprim.com/nfc
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: read

concurrency:
  group: editor-production-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      EDITOR_PRODUCTION_URL: ${{ inputs.production_url || 'https://www.mcprim.com/nfc' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Wait for production deployment
        if: github.event_name == 'push'
        run: sleep 75

      - name: Run production smoke tests with deploy retries
        shell: bash
        run: |
          set -o pipefail
          attempts=4
          for attempt in $(seq 1 "$attempts"); do
            echo "Production smoke attempt $attempt/$attempts"
            if npx playwright test e2e/editor-production-smoke.spec.js --browser=chromium --reporter=line,html; then
              exit 0
            fi
            if [ "$attempt" -lt "$attempts" ]; then
              echo "Production may still be deploying; retrying in 45 seconds."
              sleep 45
            fi
          done
          exit 1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: editor-production-smoke-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
