name: Editor Production Smoke

on:
  workflow_dispatch:
    inputs:
      production_url:
        description: Production base URL
        required: false
        default: https://www.mcprim.com/nfc
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: read

concurrency:
  group: editor-production-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      EDITOR_PRODUCTION_URL: ${{ inputs.production_url || 'https://www.mcprim.com/nfc' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run production smoke tests
        run: npx playwright test e2e/editor-production-smoke.spec.js --project=chromium --reporter=line

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: editor-production-smoke-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
