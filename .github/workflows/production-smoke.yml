name: Production smoke verification

on:
  workflow_dispatch:
    inputs:
      public_origin:
        description: Public frontend origin
        required: false
        default: https://www.mcprim.com
      api_origin:
        description: Render API origin
        required: false
        default: https://nfc-vjy6.onrender.com
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/production-smoke.yml
  schedule:
    - cron: '17 4 * * *'

permissions:
  contents: read

concurrency:
  group: production-smoke-verification
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PUBLIC_ORIGIN: ${{ inputs.public_origin || 'https://www.mcprim.com' }}
      API_ORIGIN: ${{ inputs.api_origin || 'https://nfc-vjy6.onrender.com' }}
      PRODUCTION_VERIFY_REPORT: production-verification.json
      VERIFY_ATTEMPTS: '3'
      VERIFY_TIMEOUT_MS: '15000'
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Verify the live frontend and API release
        run: npm run verify:production

      - name: Upload production verification report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: production-verification-${{ github.run_number }}
          path: production-verification.json
          retention-days: 30
          if-no-files-found: warn
