name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    
    # Install both normal and dev dependencies
    - run: npm install

    # Run jest test cases explicitly checking that it shouldn't fail builds
    - run: npm test

    # Security audit for critical vulnerabilities
    - run: npm audit --audit-level=critical || true
