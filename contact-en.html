    <main style="max-width:700px;margin:auto;padding:2rem">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h1>Contact Us</h1>
            <button onclick="switchLanguage('ar')" class="lang-btn">عربي</button>
        </div>
        <p>For any inquiries or technical support, we are happy to connect with you. You can fill out the form below or email us directly.</p>
        
        <div style="background: rgba(36, 52, 71, 0.4); padding: 2rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 2rem;">
            <form id="contact-form" action="mailto:support@mcprim.com" method="POST" enctype="text/plain" style="display: flex; flex-direction: column; gap: 1rem;">
                <div>
                    <label for="name" style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Full Name *</label>
                    <input type="text" id="name" name="name" required style="width: 100%; padding: 0.75rem; border-radius: 6px; border: 1px solid #364f6b; background: #1c2a3b; color: #fff;">
                </div>
                <div>
                    <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Email Address *</label>
                    <input type="email" id="email" name="email" required style="width: 100%; padding: 0.75rem; border-radius: 6px; border: 1px solid #364f6b; background: #1c2a3b; color: #fff;">
                </div>
                <div>
                    <label for="subject" style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Subject</label>
                    <input type="text" id="subject" name="subject" style="width: 100%; padding: 0.75rem; border-radius: 6px; border: 1px solid #364f6b; background: #1c2a3b; color: #fff;">
                </div>
                <div>
                    <label for="message" style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Message *</label>
                    <textarea id="message" name="message" rows="5" required style="width: 100%; padding: 0.75rem; border-radius: 6px; border: 1px solid #364f6b; background: #1c2a3b; color: #fff; resize: vertical;"></textarea>
                </div>
                <button type="submit" style="background: #4da6ff; color: #fff; border: none; padding: 1rem; border-radius: 6px; font-weight: bold; font-family: 'Poppins', sans-serif; cursor: pointer; font-size: 1rem; margin-top: 1rem;">Send Message</button>
            </form>
        </div>

        <div style="margin-bottom: 2rem;">
            <h3>Other ways to connect:</h3>
            <ul>
                <li>Direct Email: <a href="mailto:support@mcprim.com" style="color: #4da6ff;">support@mcprim.com</a></li>
            </ul>
        </div>

        <a href="index-en.html" style="color: #4da6ff;">&larr; Back to Home Page</a>
