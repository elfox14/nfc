<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - MC PRIME</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-base: #0f172a;
            --bg-panel: #1e293b;
            --bg-elevated: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --border: #334155;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Tajawal', 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* --- Auth Overlay --- */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .auth-box {
            background: var(--bg-panel);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .auth-box h2 { margin-bottom: 24px; color: var(--accent); }
        .input-group { margin-bottom: 20px; text-align: right; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 0.9rem; }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: monospace;
            direction: ltr;
        }
        .input-group input:focus { outline: none; border-color: var(--accent); }
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }
        .btn:hover { background: var(--accent-hover); transform: translateY(-1px); }

        /* --- Dashboard Layout --- */
        #app { display: none; min-height: 100vh; }
        .sidebar {
            width: 260px;
            background: var(--bg-panel);
            border-left: 1px solid var(--border);
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            padding: 24px 0;
            display: flex;
            flex-direction: column;
        }
        .logo { padding: 0 24px 32px; font-size: 1.5rem; font-weight: 800; color: var(--text-primary); display: flex; align-items: center; gap: 12px; }
        .logo i { color: var(--accent); }
        .nav-items { flex: 1; }
        .nav-item {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            font-weight: 500;
        }
        .nav-item:hover, .nav-item.active {
            color: var(--accent);
            background: rgba(59, 130, 246, 0.1);
            border-right: 4px solid var(--accent);
        }
        .nav-item i { width: 20px; font-size: 1.1rem; }

        .main-content {
            margin-right: 260px;
            padding: 40px;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .header h1 { font-size: 1.8rem; font-weight: 700; }
        .header .user-info { color: var(--text-secondary); font-size: 0.9rem; }

        /* --- Views --- */
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-bottom: 40px; }
        .stat-card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .stat-icon { width: 56px; height: 56px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .stat-info h3 { color: var(--text-secondary); font-size: 0.9rem; font-weight: 500; margin-bottom: 4px; }
        .stat-info p { font-size: 1.8rem; font-weight: 700; color: var(--text-primary); }
        
        .icon-blue { background: rgba(59, 130, 246, 0.1); color: var(--accent); }
        .icon-green { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .icon-purple { background: rgba(139, 92, 246, 0.1); color: #8b5cf6; }
        .icon-red { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        /* Tables */
        .table-container {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .table-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .table-header h2 { font-size: 1.2rem; }
        .search-box {
            position: relative;
        }
        .search-box input {
            background: var(--bg-base);
            border: 1px solid var(--border);
            padding: 8px 16px 8px 36px;
            border-radius: 6px;
            color: var(--text-primary);
            outline: none;
            width: 250px;
        }
        .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }
        
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th, td { padding: 16px 24px; border-bottom: 1px solid var(--border); }
        th { color: var(--text-secondary); font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; background: rgba(255,255,255,0.02); }
        td { font-size: 0.95rem; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.01); }
        
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge.success { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .badge.warning { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .badge.danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        .pagination { padding: 16px 24px; display: flex; justify-content: center; gap: 8px; border-top: 1px solid var(--border); }
        .page-btn {
            background: var(--bg-elevated);
            border: none;
            color: var(--text-primary);
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        .page-btn:hover { background: var(--accent); }
        .page-btn.active { background: var(--accent); }

        /* Error Log specific */
        .error-item { padding: 16px 24px; border-bottom: 1px solid var(--border); }
        .error-item:last-child { border-bottom: none; }
        .error-meta { display: flex; gap: 16px; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-secondary); }
        .error-msg { font-family: monospace; color: #fca5a5; background: rgba(239, 68, 68, 0.05); padding: 12px; border-radius: 6px; border-left: 3px solid var(--danger); direction: ltr; text-align: left; }

        .loader {
            display: inline-block;
            width: 24px; height: 24px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-state { padding: 40px; text-align: center; color: var(--text-secondary); }
    </style>
</head>
<body>

    <!-- Auth Overlay -->
    <div id="auth-overlay">
        <div class="auth-box">
            <h2><i class="fas fa-shield-alt"></i> وصول إداري</h2>
            <p style="color: var(--text-secondary); margin-bottom: 24px; font-size: 0.9rem;">يرجى إدخال رمز الوصول الإداري (Admin Token) للمتابعة.</p>
            <form id="auth-form" onsubmit="event.preventDefault(); login();">
                <div class="input-group">
                    <input type="password" id="admin-token" placeholder="أدخل الرمز السري هنا..." required autocomplete="off">
                </div>
                <button type="submit" class="btn" id="login-btn">دخول</button>
                <div id="login-error" style="color: var(--danger); margin-top: 16px; font-size: 0.9rem; display: none;">الرمز غير صحيح</div>
            </form>
        </div>
    </div>

    <!-- Main App -->
    <div id="app">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-bolt"></i>
                MC PRIME
            </div>
            <div class="nav-items">
                <a class="nav-item active" onclick="switchView('dashboard')">
                    <i class="fas fa-chart-pie"></i> نظرة عامة
                </a>
                <a class="nav-item" onclick="switchView('users'); loadUsers();">
                    <i class="fas fa-users"></i> المستخدمين
                </a>
                <a class="nav-item" onclick="switchView('errors'); loadErrors();">
                    <i class="fas fa-exclamation-triangle"></i> سجل الأخطاء
                </a>
            </div>
            <div style="padding: 24px; margin-top: auto;">
                <button class="btn" style="background: var(--bg-elevated); color: var(--text-secondary);" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div class="header">
                <h1 id="page-title">نظرة عامة</h1>
                <div class="user-info" id="last-update">آخر تحديث: الآن</div>
            </div>

            <!-- View: Dashboard -->
            <div id="view-dashboard" class="view active">
                <div class="stats-grid" id="stats-container">
                    <!-- Loaded via JS -->
                </div>

                <div class="table-container">
                    <div class="table-header">
                        <h2>أحدث التصاميم</h2>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>المعرف</th>
                                <th>اسم التصميم</th>
                                <th>المشاهدات</th>
                                <th>تاريخ الإنشاء</th>
                            </tr>
                        </thead>
                        <tbody id="recent-designs-tbody">
                            <!-- Loaded via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- View: Users -->
            <div id="view-users" class="view">
                <div class="table-container">
                    <div class="table-header">
                        <h2>إدارة المستخدمين</h2>
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="user-search" placeholder="بحث بالاسم أو الإيميل..." onkeyup="debounceSearch()">
                        </div>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>الاسم</th>
                                <th>البريد الإلكتروني</th>
                                <th>الحالة</th>
                                <th>تاريخ التسجيل</th>
                            </tr>
                        </thead>
                        <tbody id="users-tbody">
                            <!-- Loaded via JS -->
                        </tbody>
                    </table>
                    <div class="pagination" id="users-pagination"></div>
                </div>
            </div>

            <!-- View: Errors -->
            <div id="view-errors" class="view">
                <div class="table-container">
                    <div class="table-header">
                        <h2>سجل الأخطاء (آخر 50)</h2>
                        <button class="btn" style="width: auto; padding: 6px 12px; font-size: 0.85rem;" onclick="loadErrors()"><i class="fas fa-sync-alt"></i> تحديث</button>
                    </div>
                    <div id="errors-container">
                        <!-- Loaded via JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let token = localStorage.getItem('adminToken') || '';
        let currentUserPage = 1;
        let searchTimeout = null;

        // Base URL for API
        const getApiUrl = (path) => {
            const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            if (isLocal) return `http://localhost:3000${path}`;
            const encoded = 'aHR0cHM6Ly9uZmMtdmp5Ni5vbnJlbmRlci5jb20=';
            return `${atob(encoded)}${path}`;
        };

        // Initialize
        if (token) {
            checkTokenAndLoad();
        }

        async function login() {
            const input = document.getElementById('admin-token').value;
            const btn = document.getElementById('login-btn');
            btn.innerHTML = '<div class="loader"></div>';
            
            try {
                const res = await fetch(getApiUrl('/api/admin/stats'), {
                    headers: { 'x-admin-token': input }
                });
                
                if (res.ok) {
                    token = input;
                    localStorage.setItem('adminToken', token);
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    loadDashboard(await res.json());
                } else {
                    document.getElementById('login-error').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('login-error').textContent = 'خطأ في الاتصال بالخادم';
                document.getElementById('login-error').style.display = 'block';
            } finally {
                btn.innerHTML = 'دخول';
            }
        }

        function logout() {
            token = '';
            localStorage.removeItem('adminToken');
            document.getElementById('auth-overlay').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
            document.getElementById('admin-token').value = '';
        }

        async function checkTokenAndLoad() {
            try {
                const res = await fetch(getApiUrl('/api/admin/stats'), {
                    headers: { 'x-admin-token': token }
                });
                if (res.ok) {
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    loadDashboard(await res.json());
                } else {
                    logout();
                }
            } catch (e) {
                console.error(e);
            }
        }

        function switchView(viewName) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`view-${viewName}`).classList.add('active');
            event.currentTarget.classList.add('active');
            
            const titles = {
                'dashboard': 'نظرة عامة',
                'users': 'المستخدمين',
                'errors': 'سجل الأخطاء'
            };
            document.getElementById('page-title').textContent = titles[viewName];
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('last-update').textContent = `آخر تحديث: ${now.toLocaleTimeString('ar-EG')}`;
        }

        // --- Loaders ---

        function loadDashboard(data) {
            updateTime();
            
            const statsHtml = `
                <div class="stat-card">
                    <div class="stat-icon icon-blue"><i class="fas fa-users"></i></div>
                    <div class="stat-info">
                        <h3>إجمالي المستخدمين</h3>
                        <p>${data.totalUsers.toLocaleString()}</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon icon-green"><i class="fas fa-user-check"></i></div>
                    <div class="stat-info">
                        <h3>مستخدمين نشطين (مؤكدين)</h3>
                        <p>${data.verifiedUsers.toLocaleString()}</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon icon-purple"><i class="fas fa-id-card"></i></div>
                    <div class="stat-info">
                        <h3>إجمالي البطاقات (التصاميم)</h3>
                        <p>${data.totalDesigns.toLocaleString()}</p>
                    </div>
                </div>
            `;
            document.getElementById('stats-container').innerHTML = statsHtml;

            const tbody = document.getElementById('recent-designs-tbody');
            if (data.recentDesigns && data.recentDesigns.length > 0) {
                tbody.innerHTML = data.recentDesigns.map(d => `
                    <tr>
                        <td style="font-family: monospace;">${d.shortId}</td>
                        <td>${d.data?.inputs?.name || 'بدون اسم'}</td>
                        <td>${d.views || 0}</td>
                        <td>${new Date(d.createdAt).toLocaleDateString('ar-EG')}</td>
                    </tr>
                `).join('');
            } else {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:30px;">لا توجد تصاميم بعد</td></tr>';
            }
        }

        async function loadUsers(page = 1) {
            currentUserPage = page;
            const search = document.getElementById('user-search').value;
            const tbody = document.getElementById('users-tbody');
            tbody.innerHTML = '<tr><td colspan="4"><div class="loading-state"><div class="loader"></div></div></td></tr>';
            
            try {
                const res = await fetch(getApiUrl(`/api/admin/users?page=${page}&search=${encodeURIComponent(search)}`), {
                    headers: { 'x-admin-token': token }
                });
                
                if (res.status === 401 || res.status === 403) return logout();
                
                const data = await res.json();
                updateTime();

                if (data.users && data.users.length > 0) {
                    tbody.innerHTML = data.users.map(u => `
                        <tr>
                            <td><strong>${u.name || 'بدون اسم'}</strong></td>
                            <td style="direction: ltr; text-align: right;">${u.email}</td>
                            <td>
                                ${u.isVerified 
                                    ? '<span class="badge success">مُؤكد</span>' 
                                    : '<span class="badge warning">غير مُؤكد</span>'}
                            </td>
                            <td>${new Date(u.createdAt).toLocaleDateString('ar-EG')}</td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:30px;">لا يوجد مستخدمين</td></tr>';
                }

                // Render Pagination
                const pag = document.getElementById('users-pagination');
                pag.innerHTML = '';
                for (let i = 1; i <= data.pages; i++) {
                    pag.innerHTML += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="loadUsers(${i})">${i}</button>`;
                }

            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:var(--danger);">خطأ في جلب البيانات</td></tr>`;
            }
        }

        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                loadUsers(1);
            }, 500);
        }

        async function loadErrors() {
            const container = document.getElementById('errors-container');
            container.innerHTML = '<div class="loading-state"><div class="loader"></div></div>';
            
            try {
                const res = await fetch(getApiUrl('/api/admin/errors?limit=50'), {
                    headers: { 'x-admin-token': token }
                });
                
                if (res.status === 401 || res.status === 403) return logout();
                
                const data = await res.json();
                updateTime();

                if (data.errors && data.errors.length > 0) {
                    container.innerHTML = data.errors.map(err => {
                        const date = new Date(err.timestamp).toLocaleString('ar-EG');
                        return `
                        <div class="error-item">
                            <div class="error-meta">
                                <span><i class="fas fa-clock"></i> ${date}</span>
                                <span><i class="fas fa-route"></i> ${err.context?.route || 'N/A'}</span>
                                ${err.context?.ip ? `<span><i class="fas fa-network-wired"></i> ${err.context.ip}</span>` : ''}
                            </div>
                            <div class="error-msg">${err.message}</div>
                        </div>
                    `}).join('');
                } else {
                    container.innerHTML = '<div style="padding: 40px; text-align: center; color: var(--success);"><i class="fas fa-check-circle" style="font-size: 2rem; margin-bottom: 10px;"></i><br>لا توجد أخطاء مسجلة!</div>';
                }
            } catch (e) {
                container.innerHTML = `<div style="padding: 40px; text-align: center; color: var(--danger);">خطأ في جلب سجل الأخطاء</div>`;
            }
        }
    </script>
</body>
</html>
