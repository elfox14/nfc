<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرر البطاقات الاحترافي V2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Cairo:wght@400;700&family=Poppins:wght@400;600&display=swap">
    <link rel="stylesheet" href="style.css"> <!-- Reuse variables -->
    <link rel="stylesheet" href="editor-v2.css">
</head>

<body>
    <!-- Top Header -->
    <header class="v2-header">
        <div class="header-left">
            <button class="btn btn-secondary" id="btn-undo" title="تراجع"><i class="fas fa-undo"></i></button>
            <button class="btn btn-secondary" id="btn-redo" title="إعادة"><i class="fas fa-redo"></i></button>
            <div class="zoom-controls">
                <button id="zoom-out"><i class="fas fa-minus"></i></button>
                <span id="zoom-level">100%</span>
                <button id="zoom-in"><i class="fas fa-plus"></i></button>
            </div>
        </div>
        <div class="header-center">
            <div class="side-toggle">
                <button class="active" data-side="front">الوجه الأمامي</button>
                <button data-side="back">الوجه الخلفي</button>
            </div>
        </div>
        <div class="header-right">
            <button class="btn btn-secondary" id="btn-export-png" title="تصدير PNG"><i class="fas fa-file-image"></i>
                PNG</button>
            <button class="btn btn-secondary" id="btn-export-pdf" title="تصدير PDF"><i class="fas fa-file-pdf"></i>
                PDF</button>
            <button class="btn btn-primary" id="btn-save"><i class="fas fa-save"></i> حفظ</button>
            <button class="btn btn-success" id="btn-share"><i class="fas fa-share-alt"></i> مشاركة</button>
        </div>
    </header>

    <main class="v2-main-container">
        <!-- Left Sidebar: Tools -->
        <aside class="v2-tools-sidebar">
            <div class="tool-group">
                <p class="group-label">إضافة عناصر</p>
                <button class="tool-btn" data-tool="text" title="نص"><i class="fas fa-font"></i></button>
                <button class="tool-btn" data-tool="image" title="صورة"><i class="fas fa-image"></i></button>
                <button class="tool-btn" data-tool="avatar" title="صورة شخصية"><i
                        class="fas fa-user-circle"></i></button>
                <button class="tool-btn" data-tool="qr" title="QR Code"><i class="fas fa-qrcode"></i></button>
                <button class="tool-btn" data-tool="social" title="روابط التواصل"><i
                        class="fas fa-share-alt"></i></button>
                <button class="tool-btn" data-tool="shape" title="شكل"><i class="fas fa-shapes"></i></button>
            </div>
            <div class="tool-group">
                <p class="group-label">تأثيرات</p>
                <button class="tool-btn" id="tool-layers-toggle" title="الطبقات"><i
                        class="fas fa-layer-group"></i></button>
                <button class="tool-btn" data-tool="grid" title="الشبكة"><i class="fas fa-border-all"></i></button>
            </div>
        </aside>

        <!-- Center: Canvas Area -->
        <section class="v2-canvas-area">
            <div class="canvas-viewport" id="canvas-viewport">
                <div class="v2-card-canvas" id="v2-card-canvas">
                    <div class="canvas-bg-layer" id="canvas-bg-layer"></div>
                    <div class="canvas-elements-layer" id="canvas-elements-layer"></div>
                    <div class="canvas-selection-layer" id="canvas-selection-layer"></div>
                </div>
            </div>
        </section>

        <!-- Right Sidebar: Properties & Layers -->
        <aside class="v2-properties-sidebar">
            <div class="sidebar-tabs">
                <button class="tab-link active" data-tab="properties">الخصائص</button>
                <button class="tab-link" data-tab="layers">الطبقات</button>
            </div>

            <div id="tab-properties" class="tab-content">
                <div id="no-selection-msg">قم باختيار عنصر لتعديل خصائصه</div>
                <div id="properties-panel" class="hidden">
                    <div class="panel-section">
                        <h3>التحويل (Transform)</h3>
                        <div class="prop-row">
                            <label>الموقع X</label>
                            <input type="number" id="prop-x" step="1">
                            <label>الموقع Y</label>
                            <input type="number" id="prop-y" step="1">
                        </div>
                        <div class="prop-row">
                            <label>العرض</label>
                            <input type="number" id="prop-w" step="1">
                            <label>الارتفاع</label>
                            <input type="number" id="prop-h" step="1">
                        </div>
                    </div>
                    <div id="dynamic-properties"></div>
                    <div class="panel-section">
                        <h3>الإجراءات</h3>
                        <button class="btn btn-danger btn-block" id="btn-delete-element"><i class="fas fa-trash"></i>
                            حذف العنصر</button>
                    </div>
                </div>
            </div>

            <div id="tab-layers" class="tab-content hidden">
                <div class="panel-section">
                    <h3>قائمة الطبقات</h3>
                    <div id="layers-list" class="layers-list"></div>
                </div>
            </div>
        </aside>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="renderer-v2.js"></script>
    <script src="script-v2.js"></script>
</body>

</html>
